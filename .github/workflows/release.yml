name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "!v*-rc*"
      - "!v*-alpha*"
      - "!v*-beta*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MAJOR=$(echo "$TAG" | grep -oP '^v\d+')

          # Latest for this major version
          aws s3 cp dist/chat-embed.js "s3://memox-cdn/embed/${MAJOR}/chat-embed.js" \
            --cache-control "public, max-age=3600" \
            --content-type "application/javascript"

          # Immutable versioned copy
          aws s3 cp dist/chat-embed.js "s3://memox-cdn/embed/${TAG}/chat-embed.js" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"

      - name: Invalidate CloudFront cache
        run: |
          MAJOR=$(echo "${GITHUB_REF#refs/tags/}" | grep -oP '^v\d+')
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/embed/${MAJOR}/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/chat-embed.js
