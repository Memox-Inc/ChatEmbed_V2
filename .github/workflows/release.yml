name: Release Chat Embed

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 3.0.0, 3.0.1)"
        required: true
        type: string
      set_active:
        description: "Set as active version?"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - run: npm run build

      - name: Check bundle size
        run: |
          RAW=$(stat -c%s dist/chat-embed.js)
          GZIP=$(gzip -c dist/chat-embed.js | wc -c)
          echo "📦 Raw: $(( RAW / 1024 ))KB | Gzip: $(( GZIP / 1024 ))KB"
          echo "bundle_raw=${RAW}" >> $GITHUB_OUTPUT
          echo "bundle_gzip=${GZIP}" >> $GITHUB_OUTPUT
        id: size

      - name: Update active version
        if: ${{ inputs.set_active }}
        run: |
          echo '{"version":"v${{ inputs.version }}","url":"https://cdn.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js","updated":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > latest.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/chat-embed.js package.json latest.json
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push
          git push origin "v${{ inputs.version }}"

      # MMX-578: jsDelivr keeps the resolution of non-pinned URLs like
      # ``@v3`` and ``@latest`` cached at its edge for up to 12h (s-maxage).
      # Without purging, every release silently leaves customers on the
      # previous bundle until that cache expires — even though the new
      # tag is published seconds after the workflow finishes. The dashboard
      # snippet uses ``@v3`` for every customer, so this MUST be invalidated
      # to make the release actually reach end users.
      - name: Purge jsDelivr edge cache
        run: |
          set -e
          # `@v3` ambiguous pin — every dashboard-generated snippet uses this.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v3/dist/chat-embed.js" | head -c 300; echo
          # `latest.json` so any consumer reading it gets the fresh active-version pointer.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2/latest.json" | head -c 300; echo
          # `@latest` semver pin — anyone using this should pick up the new tag immediately.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@latest/dist/chat-embed.js" | head -c 300; echo
          # The just-released specific URL. Usually cold (jsDelivr fetches a tag's
          # first request on demand), but purging is harmless and removes any
          # accidental stale entry from a prior workflow run.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js" | head -c 300; echo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ## Chat Embed v${{ inputs.version }}

            **CDN URL:**
            ```
            https://cdn.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js
            ```

            **Embed snippet:**
            ```html
            <script>
              window.SimpleChatEmbedConfig = {
                socketUrl: "wss://hub.memox.io",
                baseUrl: "https://hub.memox.io/api/v1/",
                token: "YOUR_TOKEN",
                org_id: "YOUR_ORG_ID",
                title: "AI Assistant"
              };
            </script>
            <script src="https://cdn.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js" async></script>
            ```

            **Bundle size:** ${{ steps.size.outputs.bundle_raw }} bytes raw / ${{ steps.size.outputs.bundle_gzip }} bytes gzip
          files: dist/chat-embed.js
