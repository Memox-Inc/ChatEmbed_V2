name: Release Chat Embed

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 3.0.0, 3.0.1)"
        required: true
        type: string
      set_active:
        description: "Set as active version?"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - run: npm run build

      - name: Check bundle size
        run: |
          RAW=$(stat -c%s dist/chat-embed.js)
          GZIP=$(gzip -c dist/chat-embed.js | wc -c)
          echo "bundle core  Raw: $(( RAW / 1024 ))KB | Gzip: $(( GZIP / 1024 ))KB"
          if [ "$RAW" -gt 153600 ]; then
            echo "ERROR: core bundle exceeds 150KB raw limit (${RAW} bytes)" >&2
            exit 1
          fi
          if [ "$GZIP" -gt 51200 ]; then
            echo "ERROR: core bundle exceeds 50KB gzip limit (${GZIP} bytes)" >&2
            exit 1
          fi
          CRAW=$(stat -c%s dist/chat-components.js)
          CGZIP=$(gzip -c dist/chat-components.js | wc -c)
          echo "bundle components  Raw: $(( CRAW / 1024 ))KB | Gzip: $(( CGZIP / 1024 ))KB"
          VRAW=$(stat -c%s dist/chat-voice.js)
          VGZIP=$(gzip -c dist/chat-voice.js | wc -c)
          echo "bundle voice  Raw: $(( VRAW / 1024 ))KB | Gzip: $(( VGZIP / 1024 ))KB"
          echo "bundle_raw=${RAW}" >> $GITHUB_OUTPUT
          echo "bundle_gzip=${GZIP}" >> $GITHUB_OUTPUT
          echo "components_raw=${CRAW}" >> $GITHUB_OUTPUT
          echo "components_gzip=${CGZIP}" >> $GITHUB_OUTPUT
          echo "voice_raw=${VRAW}" >> $GITHUB_OUTPUT
          echo "voice_gzip=${VGZIP}" >> $GITHUB_OUTPUT
        id: size

      - name: Update active version
        if: ${{ inputs.set_active }}
        run: |
          echo '{"version":"v${{ inputs.version }}","url":"https://cdn.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js","updated":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > latest.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # chat-components.js is the lazily-loaded rich-components bundle (MMX-468 split).
          # chat-voice.js is the lazily-loaded web-call audio bundle (MMX-468).
          # Both derive their URL from the embed script src by replacing
          # chat-embed.js -> <sibling>.js, so they MUST ship in the same tag
          # or CDN requests 404 and embeds degrade to chat-only.
          git add -f dist/chat-embed.js dist/chat-components.js dist/chat-voice.js package.json latest.json
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push
          git push origin "v${{ inputs.version }}"

      # MMX-578: jsDelivr has TWO cache layers and BOTH must be purged on
      # every release, or new tags become unreachable for hours:
      #
      #   1. Package-level tag index — maps tag names to commit SHAs.
      #      The metadata API may already know about a new tag, but the
      #      CDN content layer keeps serving the previous tag list until
      #      the package URL is purged. Without this, ``@v3`` keeps
      #      resolving to the prior version AND
      #      ``@v3.0.18/dist/chat-embed.js`` returns 404 even though the
      #      tag exists on GitHub. Observed on the v3.0.17 → v3.0.19
      #      rollout: dashboard snippets kept serving the old bundle for
      #      ~10 hours and v3.0.18 was 404 on the CDN.
      #
      #   2. URL-level edge cache — Cloudflare keeps each rendered URL
      #      for up to 12h (s-maxage=43200). Even after the tag index is
      #      refreshed, individual URLs serve stale content until purged.
      #
      # The order matters: purge the package index first so the next file
      # request triggers a fresh tag-to-commit lookup; then purge each
      # file URL the dashboard / snippets / latest.json consumers use.
      - name: Purge jsDelivr edge cache
        run: |
          set -e
          # 1) Package-level tag index — this is the critical one that
          #    makes new tags reachable from the CDN content layer.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2" | head -c 300; echo
          # 2a) `@v3` ambiguous pin — every dashboard-generated snippet uses this.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v3/dist/chat-embed.js" | head -c 300; echo
          # 2b) `latest.json` so any consumer reading it gets the fresh active-version pointer.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2/latest.json" | head -c 300; echo
          # 2c) `@latest` semver pin — anyone using this should pick up the new tag immediately.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@latest/dist/chat-embed.js" | head -c 300; echo
          # 2d) The just-released specific URL. Usually cold, but on first hit
          #     it can 404 if step 1 was skipped — see commit message.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js" | head -c 300; echo
          # 2e) Components bundle (MMX-468 split), same pins as the core bundle.
          #     loader.ts derives URL from embed script src by replacing
          #     chat-embed.js -> chat-components.js.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v3/dist/chat-components.js" | head -c 300; echo
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@latest/dist/chat-components.js" | head -c 300; echo
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-components.js" | head -c 300; echo
          # 2f) Voice bundle (MMX-468), same pins as the core bundle, because
          #     card.ts requests it from the same tag as the embed script.
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v3/dist/chat-voice.js" | head -c 300; echo
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@latest/dist/chat-voice.js" | head -c 300; echo
          curl -fsSL "https://purge.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-voice.js" | head -c 300; echo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ## Chat Embed v${{ inputs.version }}

            **CDN URL:**
            ```
            https://cdn.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js
            ```

            **Embed snippet:**
            ```html
            <script>
              window.SimpleChatEmbedConfig = {
                socketUrl: "wss://hub.memox.io",
                baseUrl: "https://hub.memox.io/api/v1/",
                token: "YOUR_TOKEN",
                org_id: "YOUR_ORG_ID",
                title: "AI Assistant"
              };
            </script>
            <script src="https://cdn.jsdelivr.net/gh/Memox-Inc/ChatEmbed_V2@v${{ inputs.version }}/dist/chat-embed.js" async></script>
            ```

            **Bundle size (core):** ${{ steps.size.outputs.bundle_raw }} bytes raw / ${{ steps.size.outputs.bundle_gzip }} bytes gzip
            **Bundle size (components):** ${{ steps.size.outputs.components_raw }} bytes raw / ${{ steps.size.outputs.components_gzip }} bytes gzip
            **Bundle size (voice):** ${{ steps.size.outputs.voice_raw }} bytes raw / ${{ steps.size.outputs.voice_gzip }} bytes gzip
          files: |
            dist/chat-embed.js
            dist/chat-components.js
            dist/chat-voice.js
