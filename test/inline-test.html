<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inline Mode Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; display: flex; height: 100vh; background: #f3f4f6; }
  .sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e7eb; padding: 20px; flex-shrink: 0; }
  .sidebar h2 { font-size: 14px; color: #6b7280; margin-bottom: 16px; }
  .sidebar a { display: block; padding: 8px 12px; margin-bottom: 4px; border-radius: 8px; color: #374151; text-decoration: none; font-size: 14px; }
  .sidebar a.active { background: #ede9fe; color: #7c3aed; font-weight: 600; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e5e7eb; font-weight: 600; font-size: 18px; }
  .content { flex: 1; padding: 24px; display: grid; grid-template-columns: 1fr 3fr; gap: 24px; min-height: 0; overflow: hidden; }
  .left-panel { display: flex; flex-direction: column; gap: 16px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
  .card h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .card p { font-size: 12px; color: #6b7280; }
  /* THIS IS THE KEY - the chat container must have explicit height */
  .chat-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; min-height: 0; display: flex; flex-direction: column; height: 100%; }
  #memox-chat-container { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>Dashboard</h2>
  <a href="#">Overview</a>
  <a href="#">Agents</a>
  <a class="active" href="#">Playground</a>
  <a href="#">Settings</a>
</div>

<div class="main">
  <div class="topbar">Playground</div>
  <div class="content">
    <div class="left-panel">
      <div class="card">
        <h3>Test Ideas</h3>
        <p>"Hello, how can you help?"</p>
        <p>"Tell me about your services"</p>
      </div>
      <div class="card">
        <h3>AI Status</h3>
        <p>Online</p>
      </div>
    </div>
    <div class="chat-card">
      <div id="memox-chat-container" style="width:100%;height:100%;min-height:0;"></div>
    </div>
  </div>
</div>

<script>
  window.SimpleChatEmbedConfig = {
    mode: 'inline',
    parentSelector: '#memox-chat-container',
    socketUrl: 'ws://localhost:8000',
    baseUrl: 'http://localhost:8000/api/v1/',
    token: 'test-token',
    org_id: '1',
    title: 'Test Agent',
    leadCapture: true,
    theme: { primary: '#8349FF' }
  };
</script>
<script src="http://localhost:8080/chat-embed.js"></script>
</body>
</html>
